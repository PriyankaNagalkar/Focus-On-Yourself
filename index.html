<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus on yourself</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <h1 class="title">Focus on <span>Yourself</span></h1>
        <div class="app-container">
            <h2 class="subtitle">Today <img class="sunIcon" src="/images/smile-sun-icon.png" alt="sun" width="50px">
            </h2>
            <p class="progress-label">Raise the bar by completing your goals!</p>
            <div class="progress-bar">
                <div class="progress-value">
                    <span>2/3 Completed</span>
                </div>
                <p class="error-label">Please set all the 3 goals</p>
            </div>
            <div class="container">
                <div class="goal-container">
                    <div class="custom-checkbox">
                        <img src="/images/download.png" alt="check-icon" class="check-icon">
                    </div>
                    <input id="first" class="goal-input" type="text" placeholder="Add new goal....">
                </div>
                <div class="goal-container">
                    <div class="custom-checkbox">
                        <img src="/images/download.png" alt="check-icon" class="check-icon">
                    </div>
                    <input id="second" class="goal-input" type="text" placeholder="Add new goal....">
                </div>
                <div class="goal-container">
                    <div class="custom-checkbox">
                        <img src="/images/download.png" alt="check-icon" class="check-icon">
                    </div>
                    <input id="third" class="goal-input" type="text" placeholder="Add new goal....">
                </div>
            </div>
            <input class="addBtn" type="button" value="Add Goals">
            <p class="quote">"Move one step ahead, today!!"</p>
            <p class="made-with">Made with ♥ by Priyanka</p>
        </div>
    </main>
</body>

</html>
